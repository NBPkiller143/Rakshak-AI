<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakshak AI | Login</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div class="background"></div>

    <div class="login-container">

        <div class="logo">
            <h1>RAKSHAK AI</h1>
            <p>Protecting Every Student, Every Second</p>
        </div>

        <div class="login-card">

            <h2>Welcome Back</h2>

            <p class="subtitle">
                Sign in to School Security Dashboard
            </p>

            <form id="loginForm">

                <div class="input-group">

                    <span class="icon">📧</span>

                    <input
                        type="email"
                        id="email"
                        placeholder="School Email"
                        required>

                </div>

                <div class="input-group">

                    <span class="icon">🔒</span>

                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required>

                    <span
                        class="toggle-password"
                        onclick="togglePassword()">

                        👁

                    </span>

                </div>

                <div class="options">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">Forgot Password?</a>

                </div>

                <button type="submit">

                    Login

                </button>

            </form>

            <p class="footer">

                Powered by AI • Robotics • Computer Vision

            </p>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
